name: 'Update *.nuspec'
description: 'A Github action that scans .NET projects, and update in nuspec-file dependencies node.'
branding:
  icon: activity
  color: yellow
inputs:
  dir:
    description: 'Root directory to scan recursively, relative to /github/workspace (e.g. src or Cross.Identity). Use "." for repo root. Absolute paths are passed through unchanged.'
    required: false
    default: '.'
#outputs:
#  upgrade-projects:
#    description: 'An array of projects that need to be upgraded.'
runs:
  using: 'docker'
  image: 'Dockerfile'
#  image: 'docker://ghcr.io/some-user/some-registry' # Starting with docker:// is important!!
  args:
    - ${{ inputs.dir }}
