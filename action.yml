name: 'Update *.nuspec'
description: 'Sync *.nuspec dependencies with csproj PackageReference versions; optionally update package.json and scoped npm.'
branding:
  icon: 'activity'
  color: 'yellow'
inputs:
  dir:
    description: 'Root directory to scan recursively, relative to /github/workspace (e.g. src/Cross.Identity). Prefer a package folder over "." — repo root scans all subfolders. Absolute paths are passed through unchanged.'
    required: false
    default: '.'
  dryRun:
    description: 'Report only; do not modify files ([DRY RUN] in the log).'
    required: false
    default: 'false'
  packageVersion:
    description: 'SemVer for package.json "version". GitHub Actions: env.GitVersion_SemVer after gitversion/execute. Env fallback: PACKAGE_VERSION, GitVersion_SemVer, semVer.'
    required: false
    default: ''
  dependencyScope:
    description: 'npm package name prefix to align to ^packageVersion. Skipped when empty.'
    required: false
    default: ''
  imageTag:
    description: 'GHCR image tag override (e.g. 2.0.117, 2.0, latest, 2.0.118-preview). When empty, derived from the action ref (@v2.0.117 → 2.0.117; @v2 → 2; @master → latest). Required for preview when using a branch ref.'
    required: false
    default: ''
outputs:
  packageVersion:
    description: 'The packageVersion input value when package.json processing ran.'
    value: ${{ steps.run.outputs.packageVersion }}
runs:
  using: composite
  steps:
    - name: Run update-nuspec container
      id: run
      shell: bash
      run: |
        set -euo pipefail
        IMAGE_TAG="$("${GITHUB_ACTION_PATH}/distribution/github-action/resolve-action-image-tag.sh" \
          "${{ inputs.imageTag }}" \
          "${{ github.action_ref }}")"
        IMAGE="ghcr.io/denis-peshkov/update-nuspec:${IMAGE_TAG}"
        echo "Using GHCR image: ${IMAGE}"
        docker run --rm \
          -v "${GITHUB_WORKSPACE}:/github/workspace" \
          -e GITHUB_OUTPUT="${GITHUB_OUTPUT:-}" \
          -e PACKAGE_VERSION="${{ inputs.packageVersion }}" \
          -e DEPENDENCY_SCOPE="${{ inputs.dependencyScope }}" \
          "${IMAGE}" \
          "${{ inputs.dir }}" \
          "${{ inputs.dryRun }}"
