name: 'Update *.nuspec'
description: 'A Github action that scans .NET projects, and update in nuspec-file dependencies node.'
branding:
  icon: activity
  color: yellow
inputs:
  dir:
    description: 'Root directory to scan recursively, relative to /github/workspace (e.g. src/Cross.Identity). Prefer a package folder over "." — repo root scans all subfolders. Absolute paths are passed through unchanged.'
    required: false
    default: '.'
  dryRun:
    description: 'Report only; do not modify .nuspec files ([DRY RUN] in the log).'
    required: false
    default: 'false'
#outputs:
#  upgrade-projects:
#    description: 'An array of projects that need to be upgraded.'
runs:
  using: 'docker'
  image: 'Dockerfile'
#  image: 'docker://ghcr.io/some-user/some-registry' # Starting with docker:// is important!!
  args:
    - ${{ inputs.dir }}
    - ${{ inputs.dryRun }}
