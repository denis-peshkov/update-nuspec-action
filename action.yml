name: 'Update *.nuspec'
description: 'CLI to sync NuGet *.nuspec dependencies with PackageReference versions from matching *.csproj files; optionally update package.json version and scoped npm dependencies.'
branding:
  icon: activity
  color: yellow
inputs:
  dir:
    description: 'Root directory to scan recursively, relative to /github/workspace (e.g. src/Cross.Identity). Prefer a package folder over "." — repo root scans all subfolders. Absolute paths are passed through unchanged.'
    required: false
    default: '.'
  dryRun:
    description: 'Report only; do not modify files ([DRY RUN] in the log).'
    required: false
    default: 'false'
  packageVersion:
    description: 'SemVer for package.json "version". GitHub Actions: env.GitVersion_SemVer after gitversion/execute. Env fallback: PACKAGE_VERSION, GitVersion_SemVer, semVer.'
    required: false
    default: ''
  dependencyScope:
    description: 'npm package name prefix to align to ^packageVersion. Skipped when empty.'
    required: false
    default: ''
outputs:
  packageVersion:
    description: 'The packageVersion input value when package.json processing ran.'
runs:
  using: 'docker'
  # Prebuilt image (pushed to GHCR by CI). Each git tag points to action.yml with the
  # matching GHCR tag: @v1.2.3 → :1.2.3, @v1.2 → :1.2, @v1 → :1, master → :latest.
  image: 'docker://ghcr.io/denis-peshkov/update-nuspec:2.0'
  env:
    PACKAGE_VERSION: ${{ inputs.packageVersion }}
    DEPENDENCY_SCOPE: ${{ inputs.dependencyScope }}
  args:
    - ${{ inputs.dir }}
    - ${{ inputs.dryRun }}
