name: Publish Chocolatey

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      CHOCOLATEY_API_KEY:
        required: false

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    env:
      VERSION: ${{ inputs.version }}
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-binary-*
          path: dist/binaries
          merge-multiple: true

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Stage and pack Chocolatey package
        run: |
          set -euo pipefail
          WINDOWS_ZIP="dist/binaries/update-nuspec-${VERSION}-x86_64-pc-windows-msvc.zip"
          ./.github/workflows/scripts/stage-chocolatey-package.sh "${VERSION}" "${WINDOWS_ZIP}" "${{ github.workspace }}" dist/choco

      - name: Publish Chocolatey package
        run: ./.github/workflows/scripts/publish-chocolatey-package.sh "${{ env.VERSION }}" "dist/choco/update-nuspec.${{ env.VERSION }}.nupkg"
