name: Release Binaries

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      publish_artifacts:
        required: false
        type: boolean
        default: false

jobs:
  release-binaries:
    name: binary-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            exe: update-nuspec
          - target: aarch64-apple-darwin
            os: macos-latest
            exe: update-nuspec
          - target: x86_64-apple-darwin
            os: macos-latest
            exe: update-nuspec
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            exe: update-nuspec.exe

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Set Rust crate version
        if: inputs.publish_artifacts
        shell: bash
        run: |
          perl -pi -e 's/^version = .*/version = "${{ inputs.version }}"/' update-nuspec/Cargo.toml

      - name: Build release binary
        working-directory: update-nuspec
        shell: bash
        run: cargo build --release --bin update-nuspec --target ${{ matrix.target }}

      - name: Upload ADO binary
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: ado-binary-${{ matrix.target }}
          path: update-nuspec/target/${{ matrix.target }}/release/${{ matrix.exe }}
          if-no-files-found: error

      - name: Package release binary
        if: inputs.publish_artifacts
        shell: bash
        run: |
          set -euo pipefail
          BINARY="update-nuspec/target/${{ matrix.target }}/release/${{ matrix.exe }}"
          ARCHIVE="$(./scripts/package-release-binary.sh "${{ inputs.version }}" "${{ matrix.target }}" "${BINARY}" dist)"
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Upload release binary
        if: inputs.publish_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error
