name: CI

on:
  push:
    branches:
      - master
      - release/*
      - hotfix/*
  pull_request:
  workflow_dispatch: # allows manual runs from the Actions tab

jobs:
  build:
    permissions: # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defining-access-for-the-github_token-scopes
      contents: write

    env:
      BUILD_CONFIG: 'Release'
      TEST_PROJECT: 'UpdateNuspecTool.Tests/UpdateNuspecTool.Tests.csproj'
      EXTENSION_ROOT: '${{ github.workspace }}/azure-devops-extension'
      TASK_BIN: '${{ github.workspace }}/azure-devops-extension/task'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Disabling shallow clones is recommended for improving the relevancy of reporting

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: 5.12.0

      # Единый источник версии — semVer (GitVersion, шаг Determine Version).
      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1.1.1
        with:
          useConfigFile: true

      # master → release (stable SemVer); release/* and hotfix/* → preview (GitVersion tag: preview)
      - name: Set release channel
        if: github.event_name == 'push'
        id: channel
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            echo "name=release" >> "${GITHUB_OUTPUT}"
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          else
            echo "name=preview" >> "${GITHUB_OUTPUT}"
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        working-directory: update-nuspec
        run: cargo test --verbose

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore "$TEST_PROJECT"

      - name: Build
        run: >
          dotnet build "$TEST_PROJECT"
          --configuration "$BUILD_CONFIG"
          --no-restore

      - name: Run tests
        run: >
          dotnet test "$TEST_PROJECT"
          --configuration "$BUILD_CONFIG"
          --no-restore
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v5 # Ex: v4.0.0, See the latest version at https://github.com/marketplace/actions/sonarcloud-scan
        with:
          args: >
            -Dsonar.organization=peshkov
            -Dsonar.projectKey=UpdateNuspecTool
            -Dsonar.projectName=UpdateNuspecTool
            -Dsonar.cs.opencover.reportsPaths=TestResults/**/coverage.opencover.xml
            -Dsonar.sources=UpdateNuspecTool/,update-nuspec/src/
            -Dsonar.tests=UpdateNuspecTool.Tests/,update-nuspec/tests/
            -Dsonar.exclusions=UpdateNuspecTool.Tests/TestData/**
            -Dsonar.scanner.skipJreProvisioning=true
            -Dsonar.verbose=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

#      - name: SonarQube Quality Gate check
#        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
#        with:
#          pollingTimeoutSec: 600
#        env:
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build Docker image
        run: docker build --build-arg VERSION="${{ env.GitVersion_SemVer }}" -t update-nuspec-action:ci .

      - name: Smoke test (repo root, recursive scan)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            update-nuspec-action:ci . | grep -q 'Start processing file'

      - name: Smoke test (relative path under workspace)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            update-nuspec-action:ci .github | grep -q 'nuspec files not found'

      - name: Smoke test (dry-run)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            update-nuspec-action:ci UpdateNuspecTool.Tests/TestData true | grep -q '\[DRY RUN\]'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: azure-devops-extension/task/yarn.lock

      - name: Install Rust cross-compile targets
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64
          rustup target add x86_64-unknown-linux-gnu x86_64-pc-windows-gnu

      - name: Set Rust crate version
        working-directory: update-nuspec
        run: sed -i "s/^version = .*/version = \"${{ env.GitVersion_SemVer }}\"/" Cargo.toml

      - name: Publish ADO tool (linux-x64)
        working-directory: update-nuspec
        run: |
          set -euo pipefail
          cargo build --release --bin update-nuspec
          install -Dm755 target/release/update-nuspec "${TASK_BIN}/linux-x64/update-nuspec"

      - name: Publish ADO tool (win-x64)
        working-directory: update-nuspec
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
        run: |
          set -euo pipefail
          cargo build --release --bin update-nuspec --target x86_64-pc-windows-gnu
          install -Dm644 target/x86_64-pc-windows-gnu/release/update-nuspec.exe "${TASK_BIN}/win-x64/update-nuspec.exe"

      - name: Build ADO task wrapper
        working-directory: azure-devops-extension/task
        run: yarn install --frozen-lockfile && yarn build

      - name: Verify ADO task binaries
        run: |
          set -euo pipefail
          ls -la "${TASK_BIN}/linux-x64/" "${TASK_BIN}/win-x64/"
          test -x "${TASK_BIN}/linux-x64/update-nuspec"
          test -f "${TASK_BIN}/win-x64/update-nuspec.exe"

      - name: Install TFX CLI
        run: npm install -g tfx-cli@0.17.0

      - name: Update ADO task.json version
        env:
          PACKAGE_CHANNEL: ${{ github.event_name == 'push' && steps.channel.outputs.name || 'release' }}
        run: |
          set -euo pipefail
          # Preview: unique task folder per build (1.1.16), else agents keep stale 1.1.0 without binaries.
          if [ "${PACKAGE_CHANNEL}" = "preview" ]; then
            jq --arg sem "${{ env.GitVersion_SemVer }}" --argjson pre "${{ env.GitVersion_preReleaseNumber }}" '
              ($sem | split("-")[0] | split(".")) as $p |
              .version.Major = ($p[0] | tonumber) |
              .version.Minor = ($p[1] | tonumber) |
              .version.Patch = $pre
            ' "${TASK_BIN}/task.json" > "${TASK_BIN}/task.json.tmp"
          else
            jq --arg sem "${{ env.GitVersion_SemVer }}" '
              ($sem | split("-")[0] | split(".")) as $p |
              .version.Major = ($p[0] | tonumber) |
              .version.Minor = ($p[1] | tonumber) |
              .version.Patch = ($p[2] | tonumber)
            ' "${TASK_BIN}/task.json" > "${TASK_BIN}/task.json.tmp"
          fi
          mv "${TASK_BIN}/task.json.tmp" "${TASK_BIN}/task.json"
          echo "task.json version: $(jq -r '.version | "\(.Major).\(.Minor).\(.Patch)"' "${TASK_BIN}/task.json")"

      - name: Build ADO extension manifest
        env:
          PACKAGE_CHANNEL: ${{ github.event_name == 'push' && steps.channel.outputs.name || 'release' }}
        run: |
          set -euo pipefail
          SOURCE_MANIFEST="vss-extension.json"
          # Marketplace: only X.Y.Z or X.Y.Z.N (no -preview in version). Git tags keep semVer.
          if [ "${PACKAGE_CHANNEL}" = "preview" ]; then
            MARKETPLACE_VERSION="${{ env.GitVersion_Major }}.${{ env.GitVersion_Minor }}.${{ env.GitVersion_preReleaseNumber }}"
          else
            MARKETPLACE_VERSION="${{ env.GitVersion_SemVer }}"
          fi
          echo "Marketplace extension version: ${MARKETPLACE_VERSION} (semVer=${{ env.GitVersion_SemVer }})"
          jq --arg v "${MARKETPLACE_VERSION}" '.version = $v' \
            "${EXTENSION_ROOT}/${SOURCE_MANIFEST}" > "${EXTENSION_ROOT}/.vss-extension.build.json"

      - name: Create ADO extension VSIX
        working-directory: azure-devops-extension
        run: |
          set -euo pipefail
          rm -f ./*.vsix
          tfx extension create --manifest-globs .vss-extension.build.json
          rm -f .vss-extension.build.json
          shopt -s nullglob
          vsix=( ./*.vsix )
          if [ ${#vsix[@]} -eq 0 ]; then
            echo "No .vsix produced" >&2
            exit 1
          fi
          echo "Created ${vsix[0]}"
          unzip -l "${vsix[0]}" | grep -q 'task/linux-x64/update-nuspec' \
            || { echo "VSIX missing task/linux-x64/update-nuspec" >&2; exit 1; }
          unzip -l "${vsix[0]}" | grep -q 'task/win-x64/update-nuspec.exe' \
            || { echo "VSIX missing task/win-x64/update-nuspec.exe" >&2; exit 1; }
          unzip -l "${vsix[0]}" | grep -q 'marketplace/images/example-boilerplate-url-normalizer.png' \
            || { echo "VSIX missing overview screenshot marketplace/images/example-boilerplate-url-normalizer.png" >&2; exit 1; }
          unzip -l "${vsix[0]}" | grep -q 'marketplace/images/example-package-json.png' \
            || { echo "VSIX missing overview screenshot marketplace/images/example-package-json.png" >&2; exit 1; }

      - name: Restore ADO task.json
        if: always()
        run: git checkout -- azure-devops-extension/task/task.json

      - name: Upload ADO extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: ado-extension-vsix
          path: azure-devops-extension/*.vsix
          if-no-files-found: error

      # Tags before Marketplace: publish failure must not block v1.x.y on GitHub (GitVersion uses tags on next push).
      - name: Create git Tag
        if: ${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/') }}
        run: |
          git tag v${{ env.GitVersion_SemVer }} -f

      - name: Create git Tag
        if: ${{ github.ref == 'refs/heads/master' }}
        run: |
          git tag v${{ env.major }}.${{ env.minor }} -f
          git tag v${{ env.major }} -f

      - name: Push git Tag
        if: ${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/') }}
        run: |
          git config --global user.name 'Denis Peshkov'
          git config --global user.email 'denis.peshkov@outlook.com'
          git remote set-url origin https://x-access-token:${{ secrets.TAGTOKEN }}@github.com/${{ github.repository }}
          git push origin v${{ env.GitVersion_SemVer }} -f

      - name: Push git Tag
        if: ${{ github.ref == 'refs/heads/master' }}
        run: |
          git config --global user.name 'Denis Peshkov'
          git config --global user.email 'denis.peshkov@outlook.com'
          git remote set-url origin https://x-access-token:${{ secrets.TAGTOKEN }}@github.com/${{ github.repository }}
          git push origin v${{ env.major }}.${{ env.minor }} -f
          git push origin v${{ env.major }} -f

      - name: Publish ADO extension (release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        working-directory: azure-devops-extension
        env:
          TFXX_TOKEN: ${{ secrets.AZDO_MARKETPLACE_PAT }}
        run: |
          set -euo pipefail
          VSIX=( *.vsix )
          tfx extension publish \
            --auth-type pat \
            -t "${TFXX_TOKEN}" \
            --publisher peshkov \
            --vsix "${VSIX[0]}" \
            --extension-pricing free \
            --extension-visibility public

      - name: Publish ADO extension (preview)
        if: >-
          github.event_name == 'push' &&
          (startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/'))
        working-directory: azure-devops-extension
        env:
          TFXX_TOKEN: ${{ secrets.AZDO_MARKETPLACE_PAT }}
        run: |
          set -euo pipefail
          VSIX=( *.vsix )
          tfx extension publish \
            --auth-type pat \
            -t "${TFXX_TOKEN}" \
            --publisher peshkov \
            --vsix "${VSIX[0]}" \
            --extension-pricing free \
            --share-with peshkov

      - name: Create GitHub Release
        if: >-
          github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.GitVersion_SemVer }}
          name: v${{ env.GitVersion_SemVer }}
          prerelease: ${{ steps.channel.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: azure-devops-extension/*.vsix
