name: CI

on:
  push:
    branches:
      - master
      - release/*
      - hotfix/*
  pull_request:
  workflow_dispatch:

jobs:

  version:
    name: Versioning
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_commit: ${{ steps.version.outputs.version_commit }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
      semver: ${{ steps.version.outputs.semver }}
      channel: ${{ steps.version.outputs.channel }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        uses: ./.github/actions/version

  test:
    name: Test
    needs:
      - version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test
        with:
          sonar_token: ${{ secrets.SONAR_TOKEN }}

  release-binaries:
    needs:
      - version
      - test
    name: binary-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            exe: update-nuspec
          - target: aarch64-apple-darwin
            os: macos-latest
            exe: update-nuspec
          - target: x86_64-apple-darwin
            os: macos-latest
            exe: update-nuspec
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            exe: update-nuspec.exe
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-release-binary
        with:
          version: ${{ needs.version.outputs.version }}
          target: ${{ matrix.target }}
          exe: ${{ matrix.exe }}
          publish_artifacts: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}

  push-tags:
    name: Push Git Tags
    needs:
      - version
      - release-binaries
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      - id: push
        uses: ./.github/actions/push-tags
        with:
          version: ${{ needs.version.outputs.version }}
          major: ${{ needs.version.outputs.major }}
          minor: ${{ needs.version.outputs.minor }}
          tagtoken: ${{ secrets.TAGTOKEN }}

  build-github-action:
    name: Build GitHub Action
    needs:
      - version
      - release-binaries
    if: ${{ !failure() && !cancelled() && needs.release-binaries.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-github-action

  publish-github-action:
    name: Publish GitHub Action
    needs:
      - version
      - build-github-action
    if: ${{ !failure() && !cancelled() && needs.build-github-action.result == 'success' && github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
    steps:
      - uses: ./.github/actions/publish-github-action
        with:
          version: ${{ needs.version.outputs.version }}
          major: ${{ needs.version.outputs.major }}
          minor: ${{ needs.version.outputs.minor }}

  build-ado-extension:
    name: Build ADO Extension
    needs:
      - version
      - release-binaries
    if: ${{ !failure() && !cancelled() && needs.release-binaries.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-ado-extension
        with:
          version: ${{ needs.version.outputs.version }}
          channel: ${{ needs.version.outputs.channel }}

  publish-ado-extension:
    name: Publish ADO Extension
    needs:
      - build-ado-extension
    if: ${{ !failure() && !cancelled() && needs.build-ado-extension.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-ado-extension
        with:
          azdo_marketplace_pat: ${{ secrets.AZDO_MARKETPLACE_PAT }}

  publish-chocolatey:
    name: Publish Chocolatey
    needs:
      - version
      - release-binaries
    if: ${{ !failure() && !cancelled() && needs.release-binaries.result == 'success' && github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-chocolatey
        with:
          version: ${{ needs.version.outputs.version }}
          channel: ${{ needs.version.outputs.channel }}
          version_commit: ${{ needs.version.outputs.version_commit }}
          chocolatey_api_key: ${{ secrets.CHOCOLATEY_API_KEY }}

  publish-homebrew-tap:
    name: Publish Homebrew Preview
    needs:
      - version
      - test
    if: ${{ !failure() && !cancelled() && needs.test.result == 'success' && github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-homebrew-tap
        with:
          version: ${{ needs.version.outputs.version }}
          commit_sha: ${{ needs.version.outputs.version_commit }}
          tagtoken: ${{ secrets.TAGTOKEN }}

  publish-homebrew:
    name: Publish Homebrew
    needs:
      - version
      - publish-release
    if: ${{ !failure() && !cancelled() && needs.publish-release.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-homebrew
        with:
          version: ${{ needs.version.outputs.version }}
          version_commit: ${{ needs.version.outputs.version_commit }}
          tagtoken: ${{ secrets.TAGTOKEN }}
          homebrew_github_api_key: ${{ secrets.HOMEBREW_GITHUB_API_KEY }}

  publish-release:
    name: Publish Release
    needs:
      - version
      - release-binaries
      - push-tags
      - build-ado-extension
    if: ${{ !failure() && !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.release-binaries.result == 'success' && needs.push-tags.result == 'success' && needs.build-ado-extension.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/publish-release
        with:
          version: ${{ needs.version.outputs.version }}
          version_commit: ${{ needs.version.outputs.version_commit }}
          prerelease: ${{ needs.version.outputs.prerelease }}
