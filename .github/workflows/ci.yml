name: CI

on:
  push:
    branches:
      - master
      - release/*
      - hotfix/*
  pull_request:
  workflow_dispatch: # allows manual runs from the Actions tab

jobs:
  # Single source of truth for the version. Other jobs read needs.version.outputs.*
  # instead of re-running GitVersion.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
      major: ${{ steps.gitversion.outputs.major }}
      minor: ${{ steps.gitversion.outputs.minor }}
      semver: ${{ steps.gitversion.outputs.semVer }}
      channel: ${{ steps.channel.outputs.name }}
      prerelease: ${{ steps.channel.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Disabling shallow clones is recommended for improving the relevancy of reporting

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: 5.12.0

      # Единый источник версии — semVer (GitVersion, шаг Determine Version).
      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1.1.1
        with:
          useConfigFile: true

      # VERSION (Major.Minor.run_number) — artifacts (Docker, Cargo, ADO)
      - name: Set VERSION
        id: set
        run: |
          set -euo pipefail
          VERSION="${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}.${{ github.run_number }}${{ steps.gitversion.outputs.preReleaseLabelWithDash }}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Version: ${VERSION} (semVer=${{ steps.gitversion.outputs.semVer }})"

      # master → release (stable SemVer); release/* and hotfix/* → preview (GitVersion tag: preview)
      - name: Set release channel
        id: channel
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            echo "name=release" >> "${GITHUB_OUTPUT}"
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          else
            echo "name=preview" >> "${GITHUB_OUTPUT}"
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          fi


  release-binaries:
    needs: version
    name: binary-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            exe: update-nuspec
          - target: aarch64-apple-darwin
            os: macos-latest
            exe: update-nuspec
          - target: x86_64-apple-darwin
            os: macos-latest
            exe: update-nuspec
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            exe: update-nuspec.exe

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Set Rust crate version
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
        shell: bash
        run: |
          perl -pi -e 's/^version = .*/version = "${{ needs.version.outputs.version }}"/' update-nuspec/Cargo.toml

      - name: Build release binary
        working-directory: update-nuspec
        shell: bash
        run: cargo build --release --bin update-nuspec --target ${{ matrix.target }}

      - name: Upload ADO binary
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: ado-binary-${{ matrix.target }}
          path: update-nuspec/target/${{ matrix.target }}/release/${{ matrix.exe }}
          if-no-files-found: error

      - name: Package release binary
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
        shell: bash
        run: |
          set -euo pipefail
          BINARY="update-nuspec/target/${{ matrix.target }}/release/${{ matrix.exe }}"
          ARCHIVE="$(./scripts/package-release-binary.sh "${{ needs.version.outputs.version }}" "${{ matrix.target }}" "${BINARY}" dist)"
          echo "ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Upload release binary
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  build:
    needs:
      - version
      - release-binaries
    permissions: # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defining-access-for-the-github_token-scopes
      contents: write
      packages: write

    env:
      BUILD_CONFIG: 'Release'
      TEST_PROJECT: 'UpdateNuspecTool.Tests/UpdateNuspecTool.Tests.csproj'
      EXTENSION_ROOT: '${{ github.workspace }}/azure-devops-extension'
      TASK_BIN: '${{ github.workspace }}/azure-devops-extension/task'
      VERSION: ${{ needs.version.outputs.version }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        working-directory: update-nuspec
        run: cargo test --verbose

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore "$TEST_PROJECT"

      - name: Build
        run: >
          dotnet build "$TEST_PROJECT"
          --configuration "$BUILD_CONFIG"
          --no-restore

      - name: Run tests
        run: >
          dotnet test "$TEST_PROJECT"
          --configuration "$BUILD_CONFIG"
          --no-restore
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v5 # Ex: v4.0.0, See the latest version at https://github.com/marketplace/actions/sonarcloud-scan
        with:
          args: >
            -Dsonar.organization=peshkov
            -Dsonar.projectKey=UpdateNuspecTool
            -Dsonar.projectName=UpdateNuspecTool
            -Dsonar.cs.opencover.reportsPaths=TestResults/**/coverage.opencover.xml
            -Dsonar.sources=UpdateNuspecTool/,update-nuspec/src/
            -Dsonar.tests=UpdateNuspecTool.Tests/,update-nuspec/tests/
            -Dsonar.exclusions=UpdateNuspecTool.Tests/TestData/**
            -Dsonar.scanner.skipJreProvisioning=true
            -Dsonar.verbose=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

#      - name: SonarQube Quality Gate check
#        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
#        with:
#          pollingTimeoutSec: 600
#        env:
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Download binaries from matrix
        uses: actions/download-artifact@v4
        with:
          pattern: ado-binary-*
          path: dist/ado-binaries
          merge-multiple: true

      - name: Build Docker image
        run: |
          set -euo pipefail
          mkdir -p docker
          cp dist/ado-binaries/update-nuspec docker/update-nuspec
          chmod +x docker/update-nuspec
          docker build -t update-nuspec-action:ci .

      - name: Smoke test (repo root, recursive scan)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            update-nuspec-action:ci . | grep -q 'Start processing file'

      - name: Smoke test (relative path under workspace)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            update-nuspec-action:ci .github | grep -q 'nuspec files not found'

      - name: Smoke test (dry-run)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            update-nuspec-action:ci UpdateNuspecTool.Tests/TestData true | grep -q '\[DRY RUN\]'

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Preview branches push only the exact :version tag; moving tags (:X, :X.Y, :latest) stay on stable master.
      - name: Push image to GHCR
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
        run: |
          set -euo pipefail
          IMAGE=ghcr.io/denis-peshkov/update-nuspec
          TAGS=( "${{ needs.version.outputs.version }}" )
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            TAGS+=( \
              "${{ needs.version.outputs.major }}.${{ needs.version.outputs.minor }}" \
              "${{ needs.version.outputs.major }}" \
              latest )
          fi
          for tag in "${TAGS[@]}"; do
            docker tag update-nuspec-action:ci "${IMAGE}:${tag}"
            docker push "${IMAGE}:${tag}"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: azure-devops-extension/task/yarn.lock

      - name: Install ADO binaries
        run: |
          set -euo pipefail
          mkdir -p "${TASK_BIN}/linux-x64" "${TASK_BIN}/win-x64"
          install -Dm755 dist/ado-binaries/update-nuspec "${TASK_BIN}/linux-x64/update-nuspec"
          install -Dm644 dist/ado-binaries/update-nuspec.exe "${TASK_BIN}/win-x64/update-nuspec.exe"

      - name: Build ADO task wrapper
        working-directory: azure-devops-extension/task
        run: yarn install --frozen-lockfile && yarn build

      - name: Verify ADO task binaries
        run: |
          set -euo pipefail
          ls -la "${TASK_BIN}/linux-x64/" "${TASK_BIN}/win-x64/"
          test -x "${TASK_BIN}/linux-x64/update-nuspec"
          test -f "${TASK_BIN}/win-x64/update-nuspec.exe"

      - name: Install TFX CLI
        run: npm install -g tfx-cli@0.17.0

      - name: Update ADO task.json version
        run: |
          set -euo pipefail
          jq --arg sem "${{ env.VERSION }}" '
            ($sem | split("-")[0] | split(".")) as $p |
            .version.Major = ($p[0] | tonumber) |
            .version.Minor = ($p[1] | tonumber) |
            .version.Patch = ${{ github.run_number }}
          ' "${TASK_BIN}/task.json" > "${TASK_BIN}/task.json.tmp"
          mv "${TASK_BIN}/task.json.tmp" "${TASK_BIN}/task.json"
          echo "task.json version: $(jq -r '.version | "\(.Major).\(.Minor).\(.Patch)"' "${TASK_BIN}/task.json")"

      - name: Build ADO extension manifest
        run: |
          set -euo pipefail
          SOURCE_MANIFEST="vss-extension.json"
          jq --arg v "${{ env.VERSION }}" '.version = $v | .public = true' \
            "${EXTENSION_ROOT}/${SOURCE_MANIFEST}" > "${EXTENSION_ROOT}/.vss-extension.build.json"
          echo "Extension manifest: version=${{ env.VERSION }}, channel=${{ needs.version.outputs.channel }}, public=$(jq -r .public "${EXTENSION_ROOT}/.vss-extension.build.json")"

      - name: Create ADO extension VSIX
        working-directory: azure-devops-extension
        run: |
          set -euo pipefail
          rm -f ./*.vsix
          tfx extension create --manifest-globs .vss-extension.build.json
          rm -f .vss-extension.build.json
          shopt -s nullglob
          vsix=( ./*.vsix )
          if [ ${#vsix[@]} -eq 0 ]; then
            echo "No .vsix produced" >&2
            exit 1
          fi
          echo "Created ${vsix[0]}"
          unzip -l "${vsix[0]}" | grep -q 'task/linux-x64/update-nuspec' \
            || { echo "VSIX missing task/linux-x64/update-nuspec" >&2; exit 1; }
          unzip -l "${vsix[0]}" | grep -q 'task/win-x64/update-nuspec.exe' \
            || { echo "VSIX missing task/win-x64/update-nuspec.exe" >&2; exit 1; }
          unzip -l "${vsix[0]}" | grep -q 'marketplace/images/example-boilerplate-url-normalizer.png' \
            || { echo "VSIX missing overview screenshot marketplace/images/example-boilerplate-url-normalizer.png" >&2; exit 1; }
          unzip -l "${vsix[0]}" | grep -q 'marketplace/images/example-package-json.png' \
            || { echo "VSIX missing overview screenshot marketplace/images/example-package-json.png" >&2; exit 1; }

      - name: Restore ADO task.json
        if: always()
        run: git checkout -- azure-devops-extension/task/task.json

      - name: Upload ADO extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: ado-extension-vsix
          path: azure-devops-extension/*.vsix
          if-no-files-found: error

      # Each git tag must reference the matching GHCR image tag in action.yml.
      - name: Pin action.yml to GHCR image tags
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            ./scripts/pin-action-image.sh master "${{ needs.version.outputs.version }}" "${{ needs.version.outputs.major }}" "${{ needs.version.outputs.minor }}"
          else
            ./scripts/pin-action-image.sh preview "${{ needs.version.outputs.version }}" "${{ needs.version.outputs.major }}" "${{ needs.version.outputs.minor }}"
          fi

      - name: Push action.yml commits to master
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          set -euo pipefail
          git config --global user.name 'Denis Peshkov'
          git config --global user.email 'denis.peshkov@outlook.com'
          git remote set-url origin https://x-access-token:${{ secrets.TAGTOKEN }}@github.com/${{ github.repository }}
          git push origin HEAD:master

      - name: Push git tags
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: |
          git config --global user.name 'Denis Peshkov'
          git config --global user.email 'denis.peshkov@outlook.com'
          git remote set-url origin https://x-access-token:${{ secrets.TAGTOKEN }}@github.com/${{ github.repository }}
          git push origin v${{ needs.version.outputs.version }} -f
          git push origin v${{ needs.version.outputs.major }}.${{ needs.version.outputs.minor }} -f
          git push origin v${{ needs.version.outputs.major }} -f

      - name: Publish ADO extension (release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        working-directory: azure-devops-extension
        run: |
          set -euo pipefail
          VSIX=( *.vsix )
          tfx extension publish \
            --auth-type pat \
            -t "${{ secrets.AZDO_MARKETPLACE_PAT }}" \
            --publisher peshkov \
            --vsix "${VSIX[0]}" \
            --extension-pricing free \
            --extension-visibility public

  publish-github-release:
    name: Publish GitHub Release
    needs:
      - version
      - build
      - release-binaries
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
    permissions:
      contents: write
      actions: read
    uses: ./.github/workflows/publish-github-release.yml
    with:
      version: ${{ needs.version.outputs.version }}
      prerelease: ${{ needs.version.outputs.prerelease }}

  publish-homebrew:
    name: Publish Homebrew
    needs:
      - version
      - build
      - release-binaries
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    permissions:
      contents: read
    uses: ./.github/workflows/publish-homebrew.yml
    with:
      version: ${{ needs.version.outputs.version }}
    secrets:
      TAGTOKEN: ${{ secrets.TAGTOKEN }}
      HOMEBREW_GITHUB_API_KEY: ${{ secrets.HOMEBREW_GITHUB_API_KEY }}

  publish-chocolatey:
    name: Publish Chocolatey
    needs:
      - version
      - build
      - release-binaries
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/publish-chocolatey.yml
    with:
      version: ${{ needs.version.outputs.version }}
    secrets:
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
