name: CI

on:
  push:
    branches:
      - master
      - release/*
      - hotfix/*
  pull_request:
  workflow_dispatch: # allows manual runs from the Actions tab

jobs:
  build:
    permissions: # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defining-access-for-the-github_token-scopes
      contents: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Disabling shallow clones is recommended for improving the relevancy of reporting

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v1.1.1
        with:
          versionSpec: 5.12.0

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1.1.1
        with:
          useConfigFile: true

      - name: Test
        run: dotnet test UpdateNuspecTool.Tests/UpdateNuspecTool.Tests.csproj --configuration Release

      - name: Build Docker image
        env:
          BUILD_CONFIG: Release
        run: |
          docker build -t update-nuspec-action:ci . \
            --build-arg BUILD_CONFIG="${BUILD_CONFIG}" \
            --build-arg VERSION="${GitVersion_SemVer}" \
            --build-arg ASSEMBLY_VERSION="${GitVersion_AssemblySemVer}" \
            --build-arg FILE_VERSION="${GitVersion_AssemblySemFileVer}" \
            --build-arg INFORMATIONAL_VERSION="${GitVersion_InformationalVersion}" \
            --build-arg COMPANY="Denis Peshkov" \
            --build-arg PRODUCT="update-nuspec-action" \
            --build-arg DESCRIPTION="GitHub Action that syncs NuGet dependencies in *.nuspec with PackageReference from matching *.csproj files." \
            --build-arg REPOSITORY_URL="https://github.com/denis-peshkov/update-nuspec-action.git" \
            --build-arg REPOSITORY_TYPE=git \
            --build-arg CLS_COMPLIANT=true \
            --build-arg NEUTRAL_LANGUAGE=en

      - name: Smoke test (repo root, relative dir ".")
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            update-nuspec-action:ci . | grep -q 'nuspec files not found'

      - name: Smoke test (relative path under workspace)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            update-nuspec-action:ci .github | grep -q 'nuspec files not found'

      - name: Create git Tag
        if: ${{ contains('refs/heads/master', github.ref) || contains('refs/heads/release', github.ref) || contains('refs/heads/hotfix', github.ref) }}
        run: |
          git tag v${{ env.semVer }}

      - name: Push git Tag
        if: ${{ contains(fromJson('["refs/heads/master", "refs/heads/release", "refs/heads/hotfix"]'), github.ref) }}
        run: |
          git config --global user.name 'Denis Peshkov'
          git config --global user.email 'denis.peshkov@outlook.com'
          git remote set-url origin https://x-access-token:${{ secrets.TAGTOKEN }}@github.com/${{ github.repository }}
          git push origin v${{ env.semVer }}
