name: Publish ADO Extension
description: Publish ADO VSIX to Azure DevOps Marketplace

inputs:
  azdo_marketplace_pat:
    description: Azure DevOps Marketplace publish PAT
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Download ADO extension artifact
      uses: actions/download-artifact@v4
      with:
        name: ado-extension-vsix
        path: distribution/azure-devops-extension

    - name: Install TFX CLI
      shell: bash
      run: npm install -g tfx-cli@0.17.0

    - name: Publish ADO extension
      shell: bash
      working-directory: distribution/azure-devops-extension
      env:
        AZDO_MARKETPLACE_PAT: ${{ inputs.azdo_marketplace_pat }}
      run: |
        set -euo pipefail
        shopt -s nullglob
        VSIX=( *.vsix )
        if [ ${#vsix[@]} -eq 0 ]; then
          echo "No .vsix found in artifact" >&2
          exit 1
        fi
        tfx extension publish \
          --auth-type pat \
          -t "${AZDO_MARKETPLACE_PAT}" \
          --publisher peshkov \
          --vsix "${VSIX[0]}" \
          --extension-pricing free \
          --extension-visibility public
