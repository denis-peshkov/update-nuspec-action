name: Push Git Tags
description: Push moving git tags and release version tag on master

inputs:
  version:
    description: Release version (Major.Minor.run_number)
    required: true
  major:
    description: Major version segment for moving tags
    required: true
  minor:
    description: Minor version segment for moving tags
    required: true
  tagtoken:
    description: GitHub PAT for git tag push
    required: true

runs:
  using: composite
  steps:
    - name: Push git tags
      id: push
      shell: bash
      env:
        TAGTOKEN: ${{ inputs.tagtoken }}
        VERSION: ${{ inputs.version }}
        MAJOR: ${{ inputs.major }}
        MINOR: ${{ inputs.minor }}
      run: |
        set -euo pipefail

        if [[ -z "${TAGTOKEN}" ]]; then
          echo "TAGTOKEN is required" >&2
          exit 1
        fi

        git config user.name 'Denis Peshkov'
        git config user.email 'denis.peshkov@outlook.com'
        git remote set-url origin "https://x-access-token:${TAGTOKEN}@github.com/${GITHUB_REPOSITORY}"

        commit="$(git rev-parse HEAD)"

        git tag -f "v${VERSION}" "${commit}" >&2
        git tag -f "v${MAJOR}.${MINOR}" "${commit}" >&2
        git tag -f "v${MAJOR}" "${commit}" >&2
        git push origin "v${VERSION}" "v${MAJOR}.${MINOR}" "v${MAJOR}" -f >&2

        echo "Pushed tags v${VERSION}, v${MAJOR}.${MINOR}, and v${MAJOR} at ${commit}" >&2
