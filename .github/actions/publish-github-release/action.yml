name: Publish GitHub Release
description: Create GitHub Release with binaries, checksums, source archive, and VSIX

inputs:
  version:
    required: true
  version_commit:
    description: Commit SHA for the release (from version job)
    required: true
  prerelease:
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.version_commit }}

    - name: Package source archive
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        ./.github/scripts/package-release-source.sh "${VERSION}" "${{ github.workspace }}" dist

    - name: Download VSIX artifact
      uses: actions/download-artifact@v4
      with:
        name: ado-extension-vsix
        path: dist/vsix

    - name: Download release binaries
      uses: actions/download-artifact@v4
      with:
        pattern: release-binary-*
        path: dist/binaries
        merge-multiple: true

    - name: Create checksums
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        cd dist/binaries
        sha256sum update-nuspec-* "../update-nuspec-${VERSION}-src.tar.gz" > SHA256SUMS
        mv SHA256SUMS ../SHA256SUMS

    - name: Create GitHub Release with all assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ inputs.version }}
        target_commitish: ${{ inputs.version_commit }}
        name: v${{ inputs.version }}
        prerelease: ${{ inputs.prerelease == 'true' }}
        generate_release_notes: true
        files: |
          dist/update-nuspec-*-src.tar.gz
          dist/binaries/update-nuspec-*
          dist/SHA256SUMS
          dist/vsix/*.vsix
