name: Publish GitHub Action
description: Push the GitHub Action Docker image to GHCR

inputs:
  version:
    description: Release version (Major.Minor.run_number)
    required: true
  major:
    description: Major version segment for GHCR image tags
    required: true
  minor:
    description: Minor version segment for GHCR image tags
    required: true

runs:
  using: composite
  steps:
    - name: Download GitHub Action image
      uses: actions/download-artifact@v4
      with:
        name: github-action-image
        path: dist

    - name: Load Docker image
      shell: bash
      run: |
        set -euo pipefail
        docker load -i dist/github-action-image.tar

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Push image to GHCR
      shell: bash
      run: |
        set -euo pipefail
        IMAGE=ghcr.io/denis-peshkov/update-nuspec
        TAGS=( "${{ inputs.version }}" )
        if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
          TAGS+=( \
            "${{ inputs.major }}.${{ inputs.minor }}" \
            "${{ inputs.major }}" \
            latest )
        fi
        for tag in "${TAGS[@]}"; do
          docker tag update-nuspec-action:ci "${IMAGE}:${tag}"
          docker push "${IMAGE}:${tag}"
        done
