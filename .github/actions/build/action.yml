name: Build
description: Run tests, build Docker image, GHCR push, ADO VSIX, and git tags

inputs:
  version:
    required: true
  major:
    required: true
  minor:
    required: true
  channel:
    required: true
  sonar_token:
    description: SonarCloud token
    required: true
  tagtoken:
    description: GitHub PAT for git push and tags
    required: true
  azdo_marketplace_pat:
    description: Azure DevOps Marketplace publish PAT
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, llvm-tools-preview

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Run Rust tests with coverage
      shell: bash
      working-directory: update-nuspec
      run: |
        set -euo pipefail
        mkdir -p ../TestResults/rust
        cargo llvm-cov test --verbose --lcov --output-path ../TestResults/rust/lcov.info

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      shell: bash
      env:
        TEST_PROJECT: UpdateNuspecTool.Tests/UpdateNuspecTool.Tests.csproj
      run: dotnet restore "${TEST_PROJECT}"

    - name: Build
      shell: bash
      env:
        BUILD_CONFIG: Release
        TEST_PROJECT: UpdateNuspecTool.Tests/UpdateNuspecTool.Tests.csproj
      run: dotnet build "${TEST_PROJECT}" --configuration "${BUILD_CONFIG}" --no-restore

    - name: Run tests
      shell: bash
      env:
        BUILD_CONFIG: Release
        TEST_PROJECT: UpdateNuspecTool.Tests/UpdateNuspecTool.Tests.csproj
      run: >
        dotnet test "${TEST_PROJECT}"
        --configuration "${BUILD_CONFIG}"
        --no-restore
        --verbosity normal
        --collect:"XPlat Code Coverage"
        --results-directory ./TestResults
        --
        DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

    - name: SonarQube Scan
      uses: sonarsource/sonarcloud-github-action@v5
      with:
        args: >
          -Dsonar.organization=denis-peshkov
          -Dsonar.projectKey=denis-peshkov.UpdateNuspecTool
          -Dsonar.projectName=UpdateNuspecTool
          -Dsonar.cs.opencover.reportsPaths=TestResults/**/coverage.opencover.xml
          -Dsonar.rust.lcov.reportPaths=TestResults/rust/lcov.info
          -Dsonar.rust.cargo.manifestPaths=update-nuspec/Cargo.toml
          -Dsonar.sources=UpdateNuspecTool/,update-nuspec/src/
          -Dsonar.tests=UpdateNuspecTool.Tests/,update-nuspec/tests/
          -Dsonar.exclusions=UpdateNuspecTool.Tests/TestData/**
          -Dsonar.scanner.skipJreProvisioning=true
          -Dsonar.verbose=true
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SONAR_TOKEN: ${{ inputs.sonar_token }}

    - name: Download binaries from matrix
      uses: actions/download-artifact@v4
      with:
        pattern: ado-binary-*
        path: dist/ado-binaries
        merge-multiple: true

    - name: Build Docker image
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p docker
        cp dist/ado-binaries/update-nuspec docker/update-nuspec
        chmod +x docker/update-nuspec
        docker build -t update-nuspec-action:ci .

    - name: Smoke test (repo root, recursive scan)
      shell: bash
      run: |
        set -euo pipefail
        smoke_output="$(docker run --rm \
          -v "${{ github.workspace }}:/github/workspace" \
          update-nuspec-action:ci .)"
        grep -Fq 'Start processing file' <<< "${smoke_output}"

    - name: Smoke test (relative path under workspace)
      shell: bash
      run: |
        set -euo pipefail
        smoke_output="$(docker run --rm \
          -v "${{ github.workspace }}:/github/workspace" \
          update-nuspec-action:ci .github)"
        grep -Fq 'nuspec files not found' <<< "${smoke_output}"

    - name: Smoke test (dry-run)
      shell: bash
      run: |
        set -euo pipefail
        smoke_output="$(docker run --rm \
          -v "${{ github.workspace }}:/github/workspace" \
          update-nuspec-action:ci UpdateNuspecTool.Tests/TestData true)"
        grep -Fq '[DRY RUN]' <<< "${smoke_output}"

    - name: Log in to GHCR
      if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Push image to GHCR
      if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
      shell: bash
      run: |
        set -euo pipefail
        IMAGE=ghcr.io/denis-peshkov/update-nuspec
        TAGS=( "${{ inputs.version }}" )
        if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
          TAGS+=( \
            "${{ inputs.major }}.${{ inputs.minor }}" \
            "${{ inputs.major }}" \
            latest )
        fi
        for tag in "${TAGS[@]}"; do
          docker tag update-nuspec-action:ci "${IMAGE}:${tag}"
          docker push "${IMAGE}:${tag}"
        done

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: yarn
        cache-dependency-path: azure-devops-extension/task/yarn.lock

    - name: Install ADO binaries
      shell: bash
      env:
        TASK_BIN: ${{ github.workspace }}/azure-devops-extension/task
      run: |
        set -euo pipefail
        mkdir -p "${TASK_BIN}/linux-x64" "${TASK_BIN}/win-x64"
        install -Dm755 dist/ado-binaries/update-nuspec "${TASK_BIN}/linux-x64/update-nuspec"
        install -Dm644 dist/ado-binaries/update-nuspec.exe "${TASK_BIN}/win-x64/update-nuspec.exe"

    - name: Build ADO task wrapper
      shell: bash
      working-directory: azure-devops-extension/task
      run: yarn install --frozen-lockfile && yarn build

    - name: Verify ADO task binaries
      shell: bash
      env:
        TASK_BIN: ${{ github.workspace }}/azure-devops-extension/task
      run: |
        set -euo pipefail
        ls -la "${TASK_BIN}/linux-x64/" "${TASK_BIN}/win-x64/"
        test -x "${TASK_BIN}/linux-x64/update-nuspec"
        test -f "${TASK_BIN}/win-x64/update-nuspec.exe"

    - name: Install TFX CLI
      shell: bash
      run: npm install -g tfx-cli@0.17.0

    - name: Update ADO task.json version
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        TASK_BIN: ${{ github.workspace }}/azure-devops-extension/task
      run: |
        set -euo pipefail
        jq --arg sem "${VERSION}" '
          ($sem | split("-")[0] | split(".")) as $p |
          .version.Major = ($p[0] | tonumber) |
          .version.Minor = ($p[1] | tonumber) |
          .version.Patch = ${{ github.run_number }}
        ' "${TASK_BIN}/task.json" > "${TASK_BIN}/task.json.tmp"
        mv "${TASK_BIN}/task.json.tmp" "${TASK_BIN}/task.json"
        echo "task.json version: $(jq -r '.version | "\(.Major).\(.Minor).\(.Patch)"' "${TASK_BIN}/task.json")"

    - name: Build ADO extension manifest
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        EXTENSION_ROOT: ${{ github.workspace }}/azure-devops-extension
      run: |
        set -euo pipefail
        SOURCE_MANIFEST="vss-extension.json"
        jq --arg v "${VERSION}" '.version = $v | .public = true' \
          "${EXTENSION_ROOT}/${SOURCE_MANIFEST}" > "${EXTENSION_ROOT}/.vss-extension.build.json"
        echo "Extension manifest: version=${VERSION}, channel=${{ inputs.channel }}, public=$(jq -r .public "${EXTENSION_ROOT}/.vss-extension.build.json")"

    - name: Create ADO extension VSIX
      shell: bash
      working-directory: azure-devops-extension
      run: |
        set -euo pipefail
        rm -f ./*.vsix
        tfx extension create --manifest-globs .vss-extension.build.json
        rm -f .vss-extension.build.json
        shopt -s nullglob
        vsix=( ./*.vsix )
        if [ ${#vsix[@]} -eq 0 ]; then
          echo "No .vsix produced" >&2
          exit 1
        fi
        echo "Created ${vsix[0]}"
        vsix_listing="$(unzip -l "${vsix[0]}")"
        grep -Fq 'task/linux-x64/update-nuspec' <<< "${vsix_listing}" \
          || { echo "VSIX missing task/linux-x64/update-nuspec" >&2; exit 1; }
        grep -Fq 'task/win-x64/update-nuspec.exe' <<< "${vsix_listing}" \
          || { echo "VSIX missing task/win-x64/update-nuspec.exe" >&2; exit 1; }
        grep -Fq 'marketplace/images/example-boilerplate-url-normalizer.png' <<< "${vsix_listing}" \
          || { echo "VSIX missing overview screenshot marketplace/images/example-boilerplate-url-normalizer.png" >&2; exit 1; }
        grep -Fq 'marketplace/images/example-package-json.png' <<< "${vsix_listing}" \
          || { echo "VSIX missing overview screenshot marketplace/images/example-package-json.png" >&2; exit 1; }

    - name: Restore ADO task.json
      if: always()
      shell: bash
      run: git checkout -- azure-devops-extension/task/task.json

    - name: Upload ADO extension artifact
      uses: actions/upload-artifact@v4
      with:
        name: ado-extension-vsix
        path: azure-devops-extension/*.vsix
        if-no-files-found: error

    - name: Pin action.yml to GHCR image tags
      if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/')) }}
      shell: bash
      run: |
        set -euo pipefail
        if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
          ./scripts/pin-action-image.sh master "${{ inputs.version }}" "${{ inputs.major }}" "${{ inputs.minor }}"
        else
          ./scripts/pin-action-image.sh preview "${{ inputs.version }}" "${{ inputs.major }}" "${{ inputs.minor }}"
        fi

    - name: Push action.yml commits to master
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
      shell: bash
      env:
        TAGTOKEN: ${{ inputs.tagtoken }}
      run: |
        set -euo pipefail
        git config --global user.name 'Denis Peshkov'
        git config --global user.email 'denis.peshkov@outlook.com'
        git remote set-url origin https://x-access-token:${TAGTOKEN}@github.com/${{ github.repository }}
        git push origin HEAD:master

    - name: Push git tags
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
      shell: bash
      env:
        TAGTOKEN: ${{ inputs.tagtoken }}
      run: |
        git config --global user.name 'Denis Peshkov'
        git config --global user.email 'denis.peshkov@outlook.com'
        git remote set-url origin https://x-access-token:${TAGTOKEN}@github.com/${{ github.repository }}
        git push origin v${{ inputs.version }} -f
        git push origin v${{ inputs.major }}.${{ inputs.minor }} -f
        git push origin v${{ inputs.major }} -f

    - name: Publish ADO extension (release)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      shell: bash
      working-directory: azure-devops-extension
      env:
        AZDO_MARKETPLACE_PAT: ${{ inputs.azdo_marketplace_pat }}
      run: |
        set -euo pipefail
        VSIX=( *.vsix )
        tfx extension publish \
          --auth-type pat \
          -t "${AZDO_MARKETPLACE_PAT}" \
          --publisher peshkov \
          --vsix "${VSIX[0]}" \
          --extension-pricing free \
          --extension-visibility public
